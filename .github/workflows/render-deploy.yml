name: Render Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm --prefix server install

      - name: Install client dependencies
        run: npm --prefix client install

      - name: Build client
        run: npm --prefix client run build

      - name: Verify server entrypoint
        run: npm run verify:server

      - name: Trigger Render deploy hook when configured
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping deploy hook trigger."
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
